apiVersion: apps/v1
kind: Deployment
metadata:
  name: posadskiy-website
  namespace: website
  labels:
    app: posadskiy-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posadskiy-website
  template:
    metadata:
      labels:
        app: posadskiy-website
    spec:
      imagePullSecrets:
        - name: dockerhub-registry-secret
      containers:
        - name: posadskiy-website
          image: ${DOCKERHUB_USERNAME}/posadskiy-website:${IMAGE_VERSION}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: posadskiy-website
  namespace: website
  labels:
    app: posadskiy-website
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: posadskiy-website
